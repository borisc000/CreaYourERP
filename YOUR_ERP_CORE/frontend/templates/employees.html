{% extends "base.html" %}

{% block title %}Empleados - YOUR ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1>Gestión de Empleados</h1>
    </div>
    <div class="col-md-4 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createEmployeeModal">
            + Nuevo Empleado
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover" id="employees-table">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Cédula</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="employees-body">
            <tr>
                <td colspan="7" class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal Crear Empleado -->
<div class="modal fade" id="createEmployeeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Empleado</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createEmployeeForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cédula</label>
                        <input type="text" class="form-control" id="cedula" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="submitCreateEmployee()">Crear</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadEmployees();
});

function loadEmployees() {
    fetch('/api/hr/employees')
        .then(res => res.json())
        .then(data => {
            let html = '';
            for (const emp of data) {
                html += `<tr>
                    <td>${emp.id}</td>
                    <td>${emp.first_name} ${emp.last_name}</td>
                    <td>${emp.email}</td>
                    <td>${emp.phone || '-'}</td>
                    <td>${emp.cedula}</td>
                    <td>
                        <span class="badge ${emp.status === 'active' ? 'bg-success' : 'bg-warning'}">
                            ${emp.status}
                        </span>
                    </td>
                    <td>
                        <a href="/employee/${emp.id}" class="btn btn-sm btn-info">Ver</a>
                    </td>
                </tr>`;
            }
            document.getElementById('employees-body').innerHTML = html || '<tr><td colspan="7" class="text-center">No hay empleados</td></tr>';
        })
        .catch(err => console.error('Error loading employees:', err));
}

function submitCreateEmployee() {
    const payload = {
        first_name: document.getElementById('firstName').value,
        last_name: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        cedula: document.getElementById('cedula').value,
        status: 'active'
    };

    fetch('/api/hr/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        alert('Empleado creado exitosamente');
        document.getElementById('createEmployeeForm').reset();
        bootstrap.Modal.getInstance(document.getElementById('createEmployeeModal')).hide();
        loadEmployees();
    })
    .catch(err => console.error('Error creating employee:', err));
}
</script>
{% endblock %}
