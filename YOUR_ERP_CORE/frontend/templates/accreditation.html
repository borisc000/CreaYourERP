{% extends "base.html" %}

{% block title %}Acreditación - YOUR ERP{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1>Sistema de Acreditación</h1>
        <p class="text-muted">Gestión de órdenes de servicio y cumplimiento documental</p>
    </div>
    <div class="col-md-4 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createSOModal">
            + Nueva Orden de Servicio
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover" id="so-table">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Cliente</th>
                <th>Cuadrilla</th>
                <th>Estado Acreditación</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="so-body">
            <tr>
                <td colspan="7" class="text-center">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal Crear Orden de Servicio -->
<div class="modal fade" id="createSOModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nueva Orden de Servicio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createSOForm">
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" class="form-control" id="soTitle" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ID Lead (CRM)</label>
                            <input type="number" class="form-control" id="soLeadId" placeholder="Opcional">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ID Cliente</label>
                            <input type="number" class="form-control" id="soCustomerId" placeholder="Opcional">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" class="form-control" id="soLocation" placeholder="Dirección o sitio de trabajo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nivel de Riesgo</label>
                        <select class="form-select" id="soRiskLevel">
                            <option value="low">Bajo</option>
                            <option value="medium" selected>Medio</option>
                            <option value="high">Alto</option>
                            <option value="critical">Crítico</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Inicio</label>
                            <input type="date" class="form-control" id="soStartDate">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Fin</label>
                            <input type="date" class="form-control" id="soEndDate">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="createServiceOrder()">Crear</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadServiceOrders();
});

function loadServiceOrders() {
    fetch('/api/accreditation/service-orders?company_id=1')
        .then(res => res.json())
        .then(data => {
            const orders = Array.isArray(data) ? data : [];
            let html = '';
            if (orders.length === 0) {
                html = '<tr><td colspan="7" class="text-center">No hay órdenes de servicio</td></tr>';
            }
            for (const so of orders) {
                const crewCount = so.crew_count || 0;
                const compliance = so.compliance_summary || {};
                const total = compliance.total_checked || 0;
                const compliant = compliance.compliant || 0;
                const pct = total > 0 ? Math.round((compliant / total) * 100) : 0;

                let barClass = 'bg-danger';
                if (pct >= 80) barClass = 'bg-success';
                else if (pct >= 50) barClass = 'bg-warning';

                const statusMap = {
                    'draft': '<span class="badge bg-secondary">Borrador</span>',
                    'active': '<span class="badge bg-success">Activo</span>',
                    'completed': '<span class="badge bg-info">Completado</span>',
                    'cancelled': '<span class="badge bg-danger">Cancelado</span>'
                };
                const statusBadge = statusMap[so.status] || `<span class="badge bg-secondary">${so.status || 'N/A'}</span>`;

                html += `<tr>
                    <td>${so.id}</td>
                    <td>${so.title || '-'}</td>
                    <td>${so.customer_id || so.lead_id || '-'}</td>
                    <td><span class="badge bg-primary">${crewCount} trabajadores</span></td>
                    <td style="min-width:150px">
                        <div class="d-flex align-items-center gap-2">
                            <div class="progress accreditation-progress flex-grow-1">
                                <div class="progress-bar ${barClass}" style="width: ${pct}%"></div>
                            </div>
                            <small>${pct}%</small>
                        </div>
                    </td>
                    <td>${statusBadge}</td>
                    <td>
                        <a href="/accreditation/${so.id}" class="btn btn-sm btn-info">Ver Detalle</a>
                    </td>
                </tr>`;
            }
            document.getElementById('so-body').innerHTML = html;
        })
        .catch(err => {
            console.error('Error loading service orders:', err);
            document.getElementById('so-body').innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error al cargar datos</td></tr>';
        });
}

function createServiceOrder() {
    const payload = {
        company_id: 1,
        title: document.getElementById('soTitle').value,
        location: document.getElementById('soLocation').value,
        risk_level: document.getElementById('soRiskLevel').value,
        start_date: document.getElementById('soStartDate').value || null,
        end_date: document.getElementById('soEndDate').value || null,
        status: 'draft'
    };

    const leadId = document.getElementById('soLeadId').value;
    const customerId = document.getElementById('soCustomerId').value;
    if (leadId) payload.lead_id = parseInt(leadId);
    if (customerId) payload.customer_id = parseInt(customerId);

    fetch('/api/accreditation/service-orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    })
    .then(data => {
        showNotification('Orden de servicio creada exitosamente', 'success');
        document.getElementById('createSOForm').reset();
        bootstrap.Modal.getInstance(document.getElementById('createSOModal')).hide();
        loadServiceOrders();
    })
    .catch(err => {
        console.error('Error creating service order:', err);
        showNotification('Error al crear la orden de servicio', 'danger');
    });
}
</script>
{% endblock %}
