name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd web && npm ci
          cd ../functions && npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: your-erp-staging.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: your-erp-staging
          VITE_FIREBASE_STORAGE_BUCKET: your-erp-staging.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "737679125978"
          VITE_FIREBASE_APP_ID: "1:737679125978:web:7f82aeb37a28950fa764e3"
          VITE_FIREBASE_MEASUREMENT_ID: G-Y2S9EJX3EY
          VITE_APP_ENV: staging
        run: |
          cd web && npm run build
          cd ../functions && npm run build

      - name: Deploy to Firebase Staging
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project staging --only hosting,functions,firestore:rules,firestore:indexes,storage
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_STAGING }}
